name: CI

on:
  push:
    branches:
      - main
      - develop
      - staging
      - "feat/**" # Match feat branches (e.g., feat/login, feat/ui)
  pull_request:
    branches:
      - main
      - develop
      - staging

jobs:
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2 # Match your local pnpm version (run `pnpm --version` locally)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4" # Match log version
          cache: "pnpm"

      - name: Debug pnpm installation
        run: |
          echo "pnpm version:"
          pnpm --version || echo "pnpm not found"
          echo "PATH:"
          echo $PATH

      - name: Install dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm lint

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: "pnpm"

      - name: Debug pnpm installation
        run: |
          echo "pnpm version:"
          pnpm --version || echo "pnpm not found"
          echo "PATH:"
          echo $PATH

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm build

      - name: Run Vitest
        run: pnpm test
        env:
          VITE_TRPC_URL: ${{ vars.VITE_TRPC_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_APP_NAME: TrackStax App

