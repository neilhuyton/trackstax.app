[build]
  command = "npx prisma generate && npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/.prisma/**"]

[[redirects]]
  from = "/trpc/*"
  to = "/.netlify/functions/trpc/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200